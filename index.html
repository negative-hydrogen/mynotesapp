<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #fff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  padding: 15px;
  margin: 0;
  font-size: 18px;
}

/* FOLDERS */
.folder {
  padding: 12px 15px;
  cursor: pointer;
}
.folder.active {
  background: #e5e5ea;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  position: relative;
}

/* NOTES LIST */
.notes-panel {
  width: 320px;
  background: #fff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

.topbar {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  display: flex;
  gap: 10px;
}

.note-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}
.note-item:hover {
  background: #f2f2f7;
}

/* EDITOR */
.editor-panel {
  flex: 1;
  background: #fff;
  display: flex;
  flex-direction: column;
}

.editor-topbar {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  display: flex;
  gap: 10px;
}

.editor {
  flex: 1;
  padding: 20px;
  outline: none;
  font-size: 16px;
}

/* MOBILE */
@media(max-width:768px) {

  .sidebar { display:none; }

  .main {
    overflow: hidden;
  }

  /* NOTES LIST (full screen initially) */
  .notes-panel {
    width: 100%;
    position: absolute;
    inset: 0;
    background: #fff;
    z-index: 1;
    transition: transform 0.3s ease;
  }

  /* EDITOR (hidden off screen) */
  .editor-panel {
    position: absolute;
    inset: 0;
    width: 100%;
    background: #fff;
    transform: translateX(100%);
    z-index: 2;
    transition: transform 0.3s ease;
  }

  /* WHEN OPEN NOTE */
  .show-editor .editor-panel {
    transform: translateX(0);
  }

  .show-editor .notes-panel {
    transform: translateX(-30%);
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Folders</h2>
  <div id="folders"></div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- NOTES LIST -->
  <div class="notes-panel">
    <div class="topbar">
      <input id="search" placeholder="Search..." oninput="searchNotes()">
      <button onclick="addNote()">New</button>
    </div>
    <div id="notesList"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor-panel">
    <div class="editor-topbar">
      <button onclick="goBack()">← Notes</button>
      <button onclick="deleteNote()">Delete</button>
    </div>
    <div class="editor" id="editor" contenteditable="true"></div>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("notesApp")) || {
  folders: ["All Notes"],
  notes: []
};

let currentNote = null;

/* SAVE */
function save() {
  localStorage.setItem("notesApp", JSON.stringify(data));
}

/* RENDER NOTES */
function renderNotes(filtered = null) {
  let list = document.getElementById("notesList");
  list.innerHTML = "";

  let notes = filtered || data.notes;

  notes.forEach(note => {
    let div = document.createElement("div");
    div.className = "note-item";
    div.innerText = note.content.slice(0, 40) || "New Note";

    div.onclick = () => openEditor(note);

    list.appendChild(div);
  });
}

/* OPEN NOTE */
function openEditor(note) {
  currentNote = note;
  document.getElementById("editor").innerText = note.content;

  document.getElementById("main").classList.add("show-editor");
}

/* BACK */
function goBack() {
  document.getElementById("main").classList.remove("show-editor");
}

/* ADD NOTE */
function addNote() {
  let note = {
    id: Date.now(),
    content: ""
  };

  data.notes.unshift(note);
  save();
  renderNotes();
  openEditor(note);
}

/* DELETE */
function deleteNote() {
  if (!currentNote) return;

  data.notes = data.notes.filter(n => n !== currentNote);
  save();

  goBack();
  renderNotes();
}

/* AUTO SAVE */
document.getElementById("editor").addEventListener("input", () => {
  if (!currentNote) return;

  currentNote.content = document.getElementById("editor").innerText;
  save();
  renderNotes();
});

/* SEARCH */
function searchNotes() {
  let q = document.getElementById("search").value.toLowerCase();

  let filtered = data.notes.filter(n =>
    n.content.toLowerCase().includes(q)
  );

  renderNotes(filtered);
}

/* INIT */
renderNotes();
</script>

</body>
</html>
