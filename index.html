<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

.header {
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.note-item {
  background:white;
  padding:15px;
  border-bottom:1px solid #eee;
}

.note-title { font-weight:bold; }
.note-preview { color:gray; font-size:14px; }

textarea {
  width:100%;
  height:70vh;
  border:none;
  outline:none;
  font-size:18px;
  padding:10px;
}

button {
  margin:5px;
  padding:8px;
}
</style>
</head>

<body>

<div id="lock">
  <h2 style="text-align:center;margin-top:50px;">Enter PIN</h2>
  <input type="password" id="pin">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="list" style="display:none;">
  <div class="header">Notes</div>
  <button onclick="createNote()">+ New</button>
  <div id="notes"></div>
</div>

<div id="editorView" style="display:none;">
  <button onclick="back()">← Back</button>
  <button onclick="pinNote()">📌</button>
  <button onclick="deleteNote()">Delete</button>
  <div id="time" style="margin:10px;color:gray;"></div>
  <textarea id="editor"></textarea>
</div>

<script>
const PIN="1234";
let db,currentId;

function unlock(){
  if(pin.value===PIN){
    lock.style.display="none";
    list.style.display="block";
    init();
  } else alert("Wrong PIN");
}

function init(){
  const req=indexedDB.open("DB",1);
  req.onupgradeneeded=e=>{
    db=e.target.result;
    db.createObjectStore("notes",{keyPath:"id",autoIncrement:true});
  };
  req.onsuccess=e=>{
    db=e.target.result;
    load();
  };
}

function createNote(){
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .add({text:"New Note",time:Date.now(),pinned:false});
  setTimeout(load,100);
}

function load(){
  notes.innerHTML="";
  db.transaction("notes").objectStore("notes")
  .openCursor().onsuccess=e=>{
    const c=e.target.result;
    if(c){
      const div=document.createElement("div");
      div.className="note-item";

      const t=c.value.text;
      div.innerHTML=`
        <div class="note-title">${t.split("\n")[0]}</div>
        <div class="note-preview">${t.substring(0,40)}</div>
        <small>${new Date(c.value.time).toLocaleString()}</small>
      `;

      if(c.value.pinned) div.style.background="#fffbe6";

      div.onclick=()=>{
        currentId=c.value.id;
        openEditor(c.value);
      };

      notes.appendChild(div);
      c.continue();
    }
  };
}

function openEditor(n){
  list.style.display="none";
  editorView.style.display="block";
  editor.value=n.text;
  time.innerText="Edited: "+new Date(n.time).toLocaleString();
}

editor.addEventListener("input",()=>{
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .put({
    id:currentId,
    text:editor.value,
    time:Date.now()
  });
});

function back(){
  editorView.style.display="none";
  list.style.display="block";
  load();
}

function deleteNote(){
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .delete(currentId);
  back();
}

function pinNote(){
  const tx=db.transaction("notes","readwrite");
  const store=tx.objectStore("notes");

  store.get(currentId).onsuccess=e=>{
    const note=e.target.result;
    note.pinned=!note.pinned;
    store.put(note);
    back();
  };
}
</script>

</body>
</html>
