<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notes</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
  -webkit-overflow-scrolling: touch;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #f2f2f7;
  padding: 16px;
  font-size: 28px;
  font-weight: bold;
  z-index: 10;
}

/* NOTE CARD */
.note-item {
  border-radius: 12px;
  margin: 8px 12px;
  padding: 14px;
  background: white;
  transition: all 0.2s ease;
}

.note-title { font-weight:bold; }
.note-preview { color:gray; font-size:14px; }

/* EDITOR */
textarea {
  line-height: 1.5;
  width:100%;
  height:75vh;
  border:none;
  outline:none;
  font-size:18px;
  padding:10px;
}

/* FLOAT BUTTON */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ffcc00;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

/* ===== FIXED VIEW SYSTEM ===== */
.view {
  display:none;
  animation: fadeIn 0.25s ease;
}

.view.active {
  display:block;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateX(10px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* Tap feedback */


.note-item:active {
  transform: scale(0.97);
  background: #f2f2f2;
}  

  
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
  <h2 style="text-align:center;margin-top:50px;">Enter PIN</h2>
  <input type="password" id="pin">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- LIST -->
<div id="list" class="view">
  <div class="header">Notes</div>
  <button onclick="createNote()">+ New</button>
  <div id="notes"></div>
  <div class="fab" onclick="createNote()">+</div>
</div>

<!-- EDITOR -->
<div id="editorView" class="view">
  <button onclick="back()">← Back</button>
  <button onclick="pinNote()">📌</button>
  <button onclick="deleteNote()">Delete</button>
  <div id="time"></div>
  <textarea id="editor"></textarea>
</div>

<script>
const PIN="1234";
let db,currentId;
  document.addEventListener('touchstart', ()=>{}, {passive:true});

// ===== UNLOCK =====
function unlock(){
  if(pin.value===PIN){
    document.getElementById("lock").style.display="none";
    document.getElementById("list").classList.add("active");
    init();
  } else alert("Wrong PIN");
}

// ===== DB =====
function init(){
  const req=indexedDB.open("DB",1);

  req.onupgradeneeded=e=>{
    db=e.target.result;
    db.createObjectStore("notes",{keyPath:"id",autoIncrement:true});
  };

  req.onsuccess=e=>{
    db=e.target.result;
    load();
  };
}

// ===== CREATE =====
function createNote(){
  const tx = db.transaction("notes","readwrite");
  const store = tx.objectStore("notes");

  const req = store.add({
    text: "New Note",
    time: Date.now(),
    pinned: false
  });

  req.onsuccess = (e) => {
    const id = e.target.result;

    // open immediately
    openEditor({
      id: id,
      text: "New Note",
      time: Date.now()
    });
  };
}

// ===== LOAD =====
function load(){
  notes.innerHTML="";

  let all = [];

  db.transaction("notes").objectStore("notes")
  .openCursor().onsuccess=e=>{
    const c=e.target.result;

    if(c){
      all.push(c.value);
      c.continue();
    } else {
      // sort: pinned first, then latest
      all.sort((a,b)=>{
        if(a.pinned !== b.pinned) return b.pinned - a.pinned;
        return b.time - a.time;
      });

      renderSection("Notes", all);
    }
  };
}

function renderSection(title, data){
  if(data.length===0) return;

  data.forEach(n=>{
    const div=document.createElement("div");
    div.className="note-item";

    const text = n.text;
    const lines = text.split("\n");

    const title = lines[0] || "New Note";
    const preview = lines.slice(1).join(" ").substring(0,50);

    div.innerHTML=`
      <div class="note-title">${title}</div>
      <div class="note-preview">${preview}</div>
      <div style="font-size:12px;color:gray;margin-top:5px;">
        ${new Date(n.time).toLocaleString()}
      </div>
    `;

    // ✅ IMPORTANT (mobile + desktop)
    div.ontouchstart = () => openEditor(n);
    div.onclick = () => openEditor(n);

    notes.appendChild(div);
  });
}  

// ===== OPEN =====
function openEditor(note){
  currentId = note.id;

  editor.value = note.text;
  time.innerText = new Date(note.time).toLocaleString();

  list.classList.remove("active");
  editorView.classList.add("active");

  //  mobile fix
  setTimeout(() => {
    editor.focus();
    editor.setSelectionRange(editor.value.length, editor.value.length);
  }, 100);
}

let saveTimeout;

editor.addEventListener("input", () => {
  if (!currentId) return;

  clearTimeout(saveTimeout);

  saveTimeout = setTimeout(() => {
    const tx = db.transaction("notes", "readwrite");
    const store = tx.objectStore("notes");

    store.get(currentId).onsuccess = (e) => {
      const note = e.target.result;

      store.put({
        ...note,
        text: editor.value,
        time: Date.now()
      });
    };
  }, 300); // debounce like real apps
});

// ===== BACK =====
function back(){
  if (!editor.value.trim()) {
    db.transaction("notes","readwrite")
      .objectStore("notes")
      .delete(currentId);
  }

  editorView.classList.remove("active");
  list.classList.add("active");

  load();
}

// ===== DELETE =====
function deleteNote(){
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .delete(currentId);

  back();
}

// ===== PIN =====
function pinNote(){
  const tx=db.transaction("notes","readwrite");
  const store=tx.objectStore("notes");

  store.get(currentId).onsuccess=e=>{
    const note=e.target.result;
    note.pinned=!note.pinned;
    store.put(note);
    back();
  };
}
</script>

</body>
</html>
