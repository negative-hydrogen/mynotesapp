<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #fff;
  border-right: 1px solid #ddd;
  overflow-y: auto;
}

.folder {
  padding: 12px;
  cursor: pointer;
}
.folder.active { background: #e5e5ea; }

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
}

/* NOTES LIST */
.notes-list {
  flex: 1;
  overflow-y: auto;
  background: #fff;
}

.note-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

/* EDITOR */
.editor-container {
  display: none;
  flex: 1;
  flex-direction: column;
  background: #fff;
}

.editor {
  flex: 1;
  padding: 20px;
  outline: none;
}

/* BACK BUTTON */
.back-btn {
  font-weight: bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="folders"></div>

<!-- MAIN -->
<div class="main">

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="topbar">
      <input id="search" placeholder="Search..." oninput="searchNotes()">
      <button onclick="addNote()">New</button>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- EDITOR VIEW -->
  <div class="editor-container" id="editorView">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()">← Notes</button>
      <button onclick="deleteNote()">Delete</button>
    </div>
    <div class="editor" id="editor" contenteditable="true"></div>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("notesApp")) || {
  folders: ["All Notes"],
  notes: []
};

let currentNote = null;

/* SAVE */
function save() {
  localStorage.setItem("notesApp", JSON.stringify(data));
}

/* SWITCH VIEWS */
function openEditor(note) {
  currentNote = note;

  document.getElementById("editor").innerText = note.content;

  document.getElementById("listView").style.display = "none";
  document.getElementById("editorView").style.display = "flex";
}

function goBack() {
  document.getElementById("listView").style.display = "block";
  document.getElementById("editorView").style.display = "none";
}

/* RENDER NOTES */
function renderNotes(filtered = null) {
  let list = document.getElementById("notesList");
  list.innerHTML = "";

  let notes = filtered || data.notes;

  notes.forEach(note => {
    let div = document.createElement("div");
    div.className = "note-item";
    div.innerText = note.content.slice(0, 30) || "New Note";

    div.onclick = () => openEditor(note);

    list.appendChild(div);
  });
}

/* ADD NOTE */
function addNote() {
  let note = {
    id: Date.now(),
    content: ""
  };

  data.notes.unshift(note);
  save();
  renderNotes();

  openEditor(note);
}

/* DELETE */
function deleteNote() {
  if (!currentNote) return;

  data.notes = data.notes.filter(n => n !== currentNote);
  save();

  goBack();
  renderNotes();
}

/* AUTO SAVE */
document.getElementById("editor").addEventListener("input", () => {
  if (!currentNote) return;

  currentNote.content = document.getElementById("editor").innerText;
  save();
  renderNotes();
});

/* SEARCH */
function searchNotes() {
  let q = document.getElementById("search").value.toLowerCase();

  let filtered = data.notes.filter(n =>
    n.content.toLowerCase().includes(q)
  );

  renderNotes(filtered);
}

/* INIT */
renderNotes();
</script>

</body>
</html>
