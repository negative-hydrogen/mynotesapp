<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* HEADER */
.header {
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

/* LIST */
.note-item {
  background:white;
  padding:15px;
  border-bottom:1px solid #ddd;
}

.note-title {
  font-weight:bold;
}

.note-preview {
  color:gray;
  font-size:14px;
}

/* EDIT SCREEN */
.editor {
  display:none;
}

textarea {
  width:100%;
  height:80vh;
  border:none;
  outline:none;
  font-size:18px;
  padding:10px;
}

/* BUTTON */
button {
  padding:10px;
  margin:10px;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">
  <h2 style="text-align:center;margin-top:50px;">Enter PIN</h2>
  <input type="password" id="pin" style="display:block;margin:auto;padding:10px;">
  <button onclick="unlock()" style="display:block;margin:10px auto;">Unlock</button>
</div>

<!-- LIST VIEW -->
<div id="listView" style="display:none;">
  <div class="header">Notes</div>
  <button onclick="createNote()">+ New Note</button>
  <div id="notesList"></div>
</div>

<!-- EDIT VIEW -->
<div id="editView" class="editor">
  <button onclick="goBack()">← Back</button>
  <button onclick="deleteNote()">Delete</button>
  <textarea id="editor"></textarea>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ===== PIN =====
const PIN = "1234";

function unlock() {
  if (document.getElementById('pin').value === PIN) {
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('listView').style.display='block';
    init();
  } else {
    alert("Wrong PIN");
  }
}

// ===== DB =====
let db, currentId=null;

function initDB() {
  return new Promise(res=>{
    const req = indexedDB.open("NotesDB",1);

    req.onupgradeneeded = e=>{
      db = e.target.result;
      db.createObjectStore("notes",{keyPath:"id",autoIncrement:true});
    };

    req.onsuccess = e=>{
      db = e.target.result;
      res();
    };
  });
}

async function init(){
  await initDB();
  renderList();
}

// ===== CREATE =====
function createNote(){
  const tx = db.transaction("notes","readwrite");
  tx.objectStore("notes").add({text:"New Note"});
  tx.oncomplete = renderList;
}

// ===== LIST =====
function renderList(){
  const list = document.getElementById("notesList");
  list.innerHTML="";

  const tx = db.transaction("notes","readonly");
  const store = tx.objectStore("notes");

  store.openCursor().onsuccess = e=>{
    const cursor = e.target.result;

    if(cursor){
      const div = document.createElement("div");
      div.className="note-item";

      const text = cursor.value.text;
      const title = text.split("\n")[0] || "New Note";

      div.innerHTML = `
        <div class="note-title">${title}</div>
        <div class="note-preview">${text.substring(0,40)}</div>
      `;

      div.onclick = ()=>{
        openNote(cursor.value.id, text);
      };

      list.appendChild(div);
      cursor.continue();
    }
  };
}

// ===== OPEN =====
function openNote(id,text){
  currentId=id;
  document.getElementById("listView").style.display="none";
  document.getElementById("editView").style.display="block";
  document.getElementById("editor").value=text;
}

// ===== SAVE =====
document.getElementById("editor").addEventListener("input",()=>{
  const tx = db.transaction("notes","readwrite");
  tx.objectStore("notes").put({
    id:currentId,
    text:document.getElementById("editor").value
  });
});

// ===== BACK =====
function goBack(){
  document.getElementById("editView").style.display="none";
  document.getElementById("listView").style.display="block";
  renderList();
}

// ===== DELETE =====
function deleteNote(){
  if(!confirm("Delete note?")) return;

  const tx = db.transaction("notes","readwrite");
  tx.objectStore("notes").delete(currentId);

  goBack();
}
</script>

</body>
</html>
