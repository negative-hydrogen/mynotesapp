<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #ffffff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  padding: 15px;
  margin: 0;
}

.folder {
  padding: 10px 15px;
  cursor: pointer;
}

.folder.active {
  background: #e5e5ea;
}

/* NOTES LIST */
.notes-list {
  flex: 1;
  overflow-y: auto;
}

.note-item {
  padding: 10px 15px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.note-item.active {
  background: #d1d1d6;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  padding: 10px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid #ddd;
  background: #fff;
}

input, button {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  cursor: pointer;
}

/* EDITOR */
.editor {
  flex: 1;
  padding: 20px;
  outline: none;
  font-size: 16px;
  background: #fff;
}

/* SEARCH */
.search {
  margin: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Folders</h2>
  <div id="folders"></div>

  <button onclick="addFolder()">+ Folder</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <input type="text" id="search" placeholder="Search..." oninput="searchNotes()">
    <button onclick="addNote()">New Note</button>
    <button onclick="deleteNote()">Delete</button>
  </div>

  <div class="notes-list" id="notesList"></div>

  <div class="editor" id="editor" contenteditable="true"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("notesApp")) || {
  folders: ["All Notes"],
  notes: []
};

let currentFolder = "All Notes";
let currentNote = null;

/* SAVE */
function save() {
  localStorage.setItem("notesApp", JSON.stringify(data));
}

/* RENDER FOLDERS */
function renderFolders() {
  let el = document.getElementById("folders");
  el.innerHTML = "";

  data.folders.forEach(folder => {
    let div = document.createElement("div");
    div.className = "folder" + (folder === currentFolder ? " active" : "");
    div.innerText = folder;

    div.onclick = () => {
      currentFolder = folder;
      renderFolders();
      renderNotes();
    };

    el.appendChild(div);
  });
}

/* ADD FOLDER */
function addFolder() {
  let name = prompt("Folder name:");
  if (!name) return;

  data.folders.push(name);
  save();
  renderFolders();
}

/* RENDER NOTES */
function renderNotes(filtered = null) {
  let list = document.getElementById("notesList");
  list.innerHTML = "";

  let notes = filtered || data.notes.filter(n =>
    currentFolder === "All Notes" || n.folder === currentFolder
  );

  notes.forEach(note => {
    let div = document.createElement("div");
    div.className = "note-item" + (note === currentNote ? " active" : "");
    div.innerText = note.content.slice(0, 30) || "New Note";

    div.onclick = () => {
      currentNote = note;
      document.getElementById("editor").innerText = note.content;
      renderNotes();
    };

    list.appendChild(div);
  });
}

/* ADD NOTE */
function addNote() {
  let note = {
    id: Date.now(),
    content: "",
    folder: currentFolder
  };

  data.notes.unshift(note);
  currentNote = note;

  save();
  renderNotes();
  document.getElementById("editor").innerText = "";
}

/* DELETE NOTE */
function deleteNote() {
  if (!currentNote) return;

  data.notes = data.notes.filter(n => n !== currentNote);
  currentNote = null;

  document.getElementById("editor").innerText = "";

  save();
  renderNotes();
}

/* AUTO SAVE */
document.getElementById("editor").addEventListener("input", () => {
  if (!currentNote) return;

  currentNote.content = document.getElementById("editor").innerText;
  save();
  renderNotes();
});

/* SEARCH */
function searchNotes() {
  let q = document.getElementById("search").value.toLowerCase();

  let filtered = data.notes.filter(n =>
    n.content.toLowerCase().includes(q)
  );

  renderNotes(filtered);
}

/* INIT */
renderFolders();
renderNotes();
</script>

</body>
</html>
