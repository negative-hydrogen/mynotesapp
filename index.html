<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* HEADER */
.header {
  padding:16px;
  font-size:28px;
  font-weight:bold;
}

/* NOTE CARD */
.note-item {
  background:white;
  margin:10px;
  padding:14px;
  border-radius:12px;
}

.note-title { font-weight:bold; }
.note-preview { color:gray; font-size:14px; }

/* EDITOR */
textarea {
  width:100%;
  height:75vh;
  border:none;
  outline:none;
  font-size:18px;
  padding:10px;
}

/* FLOAT BUTTON */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ffcc00;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

/* ===== FIXED VIEW SYSTEM ===== */
.view {
  display:none;
}

.view.active {
  display:block;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
  <h2 style="text-align:center;margin-top:50px;">Enter PIN</h2>
  <input type="password" id="pin">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- LIST -->
<div id="list" class="view">
  <div class="header">Notes</div>
  <button onclick="createNote()">+ New</button>
  <div id="notes"></div>
  <div class="fab" onclick="createNote()">+</div>
</div>

<!-- EDITOR -->
<div id="editorView" class="view">
  <button onclick="back()">← Back</button>
  <button onclick="pinNote()">📌</button>
  <button onclick="deleteNote()">Delete</button>
  <div id="time"></div>
  <textarea id="editor"></textarea>
</div>

<script>
const PIN="1234";
let db,currentId;

// ===== UNLOCK =====
function unlock(){
  if(pin.value===PIN){
    document.getElementById("lock").style.display="none";
    document.getElementById("list").classList.add("active");
    init();
  } else alert("Wrong PIN");
}

// ===== DB =====
function init(){
  const req=indexedDB.open("DB",1);

  req.onupgradeneeded=e=>{
    db=e.target.result;
    db.createObjectStore("notes",{keyPath:"id",autoIncrement:true});
  };

  req.onsuccess=e=>{
    db=e.target.result;
    load();
  };
}

// ===== CREATE =====
function createNote(){
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .add({text:"New Note",time:Date.now(),pinned:false});

  setTimeout(load,100);
}

// ===== LOAD =====
function load(){
  notes.innerHTML="";

  db.transaction("notes").objectStore("notes")
  .openCursor().onsuccess=e=>{
    const c=e.target.result;

    if(c){
      const div=document.createElement("div");
      div.className="note-item";

      const text=c.value.text;

      div.innerHTML=`
        <div class="note-title">${text.split("\n")[0]}</div>
        <div class="note-preview">${text.substring(0,50)}</div>
      `;

      div.onclick=()=>openEditor(c.value);

      notes.appendChild(div);
      c.continue();
    }
  };
}

// ===== OPEN =====
function openEditor(note){
  currentId = note.id;

  editor.value = note.text;
  time.innerText = new Date(note.time).toLocaleString();

  list.classList.remove("active");
  editorView.classList.add("active");
}

// ===== BACK =====
function back(){
  editorView.classList.remove("active");
  list.classList.add("active");
  load();
}

// ===== DELETE =====
function deleteNote(){
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .delete(currentId);

  back();
}

// ===== PIN =====
function pinNote(){
  const tx=db.transaction("notes","readwrite");
  const store=tx.objectStore("notes");

  store.get(currentId).onsuccess=e=>{
    const note=e.target.result;
    note.pinned=!note.pinned;
    store.put(note);
    back();
  };
}
</script>

</body>
</html>
