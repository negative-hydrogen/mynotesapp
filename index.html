<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
  background: #f2f2f7;
  color: #000;
}

/* HEADER */
.header {
  padding: 16px;
  font-size: 28px;
  font-weight: 700;
  background: #f2f2f7;
}

/* NEW BUTTON */
button {
  margin: 10px 16px;
  padding: 10px 16px;
  border-radius: 12px;
  border: none;
  background: #ffcc00;
  font-weight: 600;
}

/* NOTES LIST */
#notes {
  margin-top: 10px;
}

/* NOTE CARD */
.note-item {
  background: white;
  margin: 8px 12px;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* TITLE */
.note-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

/* PREVIEW */
.note-preview {
  font-size: 14px;
  color: #6e6e73;
}

/* TIME */
.note-time {
  font-size: 12px;
  color: #a1a1a6;
  margin-top: 6px;
}

/* PINNED */
.note-item.pinned {
  background: #fff9db;
}

/* EDITOR */
#editorView {
  background: white;
  height: 100vh;
}

textarea {
  width: 100%;
  height: 75vh;
  border: none;
  outline: none;
  font-size: 18px;
  padding: 16px;
  font-family: -apple-system;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #f9f9f9;
  border-bottom: 1px solid #ddd;
}

  /* ===== TRANSITIONS ===== */
.view {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: #f2f2f7;
  transition: transform 0.35s ease, opacity 0.3s ease;
}

/* Slide states */
.hidden-right {
  transform: translateX(100%);
}

.hidden-left {
  transform: translateX(-30%);
  opacity: 0.5;
}

.active {
  transform: translateX(0);
  opacity: 1;
}

/* Tap animation */
.note-item {
  transition: transform 0.15s ease, background 0.2s;
}

.note-item:active {
  transform: scale(0.97);
  background: #ececec;
}

/* Button tap */
button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div id="lock">
  <h2 style="text-align:center;margin-top:50px;">Enter PIN</h2>
  <input type="password" id="pin">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="list" class="view active"></div>
  <div class="note-item ${c.value.pinned ? 'pinned' : ''}">Notes</div>
  <button onclick="createNote()">+ New</button>
  <div id="notes"></div>
</div>

<div id="editorView" class="view hidden-right"></div>
  <button onclick="back()">← Back</button>
  <button onclick="pinNote()">📌</button>
  <button onclick="deleteNote()">Delete</button>
  <div id="time" style="margin:10px;color:gray;"></div>
  <textarea id="editor"></textarea>
</div>

<script>
const PIN="1234";
let db,currentId;

function unlock(){
  if(pin.value===PIN){
    lock.style.display="none";
    list.style.display="block";
    init();
  } else alert("Wrong PIN");
}

function init(){
  const req=indexedDB.open("DB",1);
  req.onupgradeneeded=e=>{
    db=e.target.result;
    db.createObjectStore("notes",{keyPath:"id",autoIncrement:true});
  };
  req.onsuccess=e=>{
    db=e.target.result;
    load();
  };
}

function createNote(){
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .add({text:"New Note",time:Date.now(),pinned:false});
  setTimeout(load,100);
}

function load(){
  notes.innerHTML="";
  db.transaction("notes").objectStore("notes")
  .openCursor().onsuccess=e=>{
    const c=e.target.result;
    if(c){
      const div=document.createElement("div");
      div.className="note-item";

      const t=c.value.text;
      div.innerHTML=`
        <div class="note-title">${t.split("\n")[0]}</div>
        <div class="note-preview">${t.substring(0,40)}</div>
        <div-class="note-time">${new Date(c.value.time).toLocaleString()}</div>
      `;

      if(c.value.pinned) div.style.background="#fffbe6";

      div.onclick=()=>{
        currentId=c.value.id;
        openEditor(c.value);
      };

      notes.appendChild(div);
      c.continue();
    }
  };
}

function openEditor(note){
  currentId = note.id;

  document.getElementById("editor").value = note.text;
  document.getElementById("time").innerText =
    "Edited: " + new Date(note.time).toLocaleString();

  const list = document.getElementById("list");
  const editor = document.getElementById("editorView");

  list.classList.remove("active");
  list.classList.add("hidden-left");

  editor.classList.remove("hidden-right");
  editor.classList.add("active");
}

function back(){
  const list = document.getElementById("list");
  const editor = document.getElementById("editorView");

  editor.classList.remove("active");
  editor.classList.add("hidden-right");

  list.classList.remove("hidden-left");
  list.classList.add("active");

  load();
}

function deleteNote(){
  db.transaction("notes","readwrite")
  .objectStore("notes")
  .delete(currentId);
  back();
}

function pinNote(){
  const tx=db.transaction("notes","readwrite");
  const store=tx.objectStore("notes");

  store.get(currentId).onsuccess=e=>{
    const note=e.target.result;
    note.pinned=!note.pinned;
    store.put(note);
    back();
  };
}
</script>

</body>
</html>
